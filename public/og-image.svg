<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Winner Winner Chicken Dinner Blackjack Trainer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="55%" stop-color="#13284a"/>
      <stop offset="100%" stop-color="#1f3f6f"/>
    </linearGradient>
    <linearGradient id="felt" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#143556"/>
      <stop offset="100%" stop-color="#1f4d7e"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#020611" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <circle cx="1020" cy="-70" r="320" fill="#72a7ff" opacity="0.15"/>
  <circle cx="120" cy="660" r="290" fill="#9fd0ff" opacity="0.12"/>

  <rect x="48" y="48" width="1104" height="534" rx="32" fill="url(#felt)" opacity="0.35"/>

  <g filter="url(#softShadow)">
