    <rect x="840" y="162" width="220" height="312" rx="16" fill="#f7fbff"/>
    <rect x="914" y="218" width="220" height="312" rx="16" fill="#f7fbff" transform="rotate(8 1024 374)" opacity="0.95"/>
  </g>

  <text x="165" y="206" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="52" font-weight="700" fill="#0f2b4d">A</text>
  <text x="163" y="252" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="52" font-weight="700" fill="#0f2b4d">♠</text>

  <text x="440" y="230" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="72" font-weight="800" fill="#ffffff">Winner Winner</text>
  <text x="440" y="302" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="72" font-weight="800" fill="#ffffff">Chicken Dinner</text>
  <text x="442" y="360" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="34" font-weight="600" fill="#d7e8ff">Blackjack Trainer • Count Smarter • Bet Cleaner</text>

  <g>
